<script>
//vaigation scroll effect//
  window.addEventListener("scroll", () => {
  const navbar = document.querySelector(".navbar");

  if (window.scrollY > 50) {
    navbar.classList.add("scrolled");
  } else {

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* BODY */
html, body {
  height: 100%;
  margin: 0;
}
body{
  font-family: 'Segoe UI', sans-serif;
  display:flex;
  flex-direction: column;
}
.contact-section  {
  background: linear-gradient(-145deg, #1bcbbd, #1450b6, #df4923c3, #fdf50d);
  background-size: 500% 500%;
  animation: gradientMove 15s ease infinite;
}

@keyframes gradientMove {
  0% {
    background-position: 0% 50%;
  }
  50% {
    background-position: 100% 50%;
  }
  100% {
    background-position: 0% 50%;
  }
}

/* NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  height: 5vh;
  width: 100%;
  background: #0f172a;
  opacity: 0.8;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 10%;
  z-index: 1000;
}

/* LOGO */
.logo {
  color: #38bdf8;
  font-size: 1.5rem;
  font-weight: bold;
}

/* LINKS */
.nav-links {
  display: flex;
  list-style: none;
}

.nav-links li {
  margin-left: 12px;
}

.nav-link {
  text-decoration: none;
  color: #fff;
  font-size: 10px;
  position: relative;
  transition: 0.3s;
}

/* Hover underline animation */
.nav-link::after {
  content: '';
  position: absolute;
  width: 0%;
  height: 2px;
  background: #38bdf8;
  left: 0;
  bottom: -5px;
  transition: 0.3s;
}

.nav-link:hover::after {
  width: 100%;
}

/* ACTIVE LINK */
.nav-link.active {
  color: #38bdf8;
}

/* MOBILE NAV */
@media (max-width: 768px) {
  .nav-links {
    position: static;
    right: -100%;
    top: 60px;
    flex-direction: row;
    width: auto;
    padding: 0;
    transition: 0.3s;
  }

  .nav-links.show {
    right: 0;
  }
}
/* battery*/
.battery {
  font-size: 18px;
  color: #fff;
}
/* SCROLLED STATE */
.navbar.scrolled {
  background: rgba(15, 23, 42, 0.95);
  box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
  border-bottom: 2px solid #38bdf8; /* 🔥 blue line */
  border-bottom: 2px solid #38bdf8;
  box-shadow: 0 0 10px #38bdf8;
}


.contact-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* CONTAINER */
.contact-container {
  max-width: 1100px;
  height: 45vh;
  width: 30vh;
  margin: auto;
  background: rgba(255, 255, 255, 0.245)  ;
  border-radius: 25px;
  border: 1px solid rgba(255, 255, 255, 0.245)  ;
}

h1 {
  text-align: center;
  margin-bottom: 10px;
}

.subtitle {
  text-align: center;
  color: #000;
  margin-bottom: 40px;
}


/* INFO */
.contact-info {
  display: grid;
  gap: 20px;
  color: white;
  width: 85%;
  margin: auto;
}

.info-item {
  background: #8be3f458;
  padding: 10px;
  border-radius: 30px;
  text-align: center;
  transition: 0.3s;
  font-size: 7px;
}

.wa-button{
  background: #8be3f458;
  padding: 1px 10px;
  border-radius: 30px;
  border-color: #8be3f458;
  text-align: center;
  transition: 0.3s;
h1, h3{
  color: rgb(13, 138, 13);
  font-size: 10px;
  font-style: bold;
}
}

.info-item:hover {
  transform: translateY(-5px);
}
.wa-button:hover {
  transform: translateY(-5px);
}

.info-item a {
  color: white;
}


.copy-btn{
    margin-left: 10px;
    padding: 8px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    background: #00adb5; 
    color: white;
}

.copy-btn:hover{
    background: #007b80; 
}

.save {
  text-align: center;
  margin-top: 25px;
  color: #f4f3e8;
  font-style: italic;
  font-weight: bold;
  font-size: 10px;
}
/* MOBILE */
@media (max-width: 768px) {

}
/* footer */

footer {

footer .section-title {

.social-media a {

.social-media img {

    height: 20px;
    border-radius: 50%;
}


</style>
